# Site settings
title: LTspice Reference Documentation
description: Comprehensive documentation for LTspice - the free, high-performance SPICE simulator from Analog Devices
baseurl: "/ltspice-reference" # the subpath of your site, e.g. /blog
url: "https://analogdevicesinc.github.io" # the base hostname & protocol for your site

# Theme
remote_theme: just-the-docs/just-the-docs

# Color scheme
color_scheme: nil # or "dark" for dark mode

# Logo
# logo: "/assets/images/logo.png"  # Optional: add your logo path

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_enabled: true
nav_sort: case_insensitive # or case_sensitive

# Aux links (top-right corner)
aux_links:
  "GitHub Repository":
    - "//github.com/analogdevicesinc/ltspice-reference"
  "LTspice Website":
    - "//www.analog.com/ltspice"

# Footer
footer_content: "Copyright 2026 Analog Devices, Inc. Licensed under Apache 2.0"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Enable copy code button
enable_copy_code_button: true

# Callouts (for notes, warnings, etc.)
callouts_level: quiet # or loud
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Google Analytics (optional)
# ga_tracking: UA-XXXXXXXX-X
# ga_tracking_anonymize_ip: true

# Exclude from processing
exclude:
  - .gitignore
  - LICENSE.md
  - BOM.md
